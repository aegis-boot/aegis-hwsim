quirks:
  - tag: fast-boot-default-on
    description: "Ships with Fast Boot enabled in BIOS. Must be disabled for USB enumeration to be reliable under `aegis-boot flash`. Not reproducible in QEMU."
  - tag: boot-key-f12
    description: "Firmware boot-menu key is F12 (not the vendor default F1/F2). Surfaces in rescue-tui's MOK walkthrough STEP 3/3 per aegis-boot#202."
  - tag: mok-manager-blue-background
    description: "MOK Manager renders blue-on-black, matching the text in rescue-tui's MOK walkthrough. No QEMU fidelity."
